
services:
  # ─────────────────────────────────────────
  #  UPTIME KUMA – Monitoring
  # ─────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    volumes:
      - ${CONFIG}/uptime-kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    ports:
      - "3003:3001"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.kuma-lan.rule=Host(`kuma.lan`)
      - traefik.http.routers.kuma-lan.entrypoints=websecure
      - traefik.http.routers.kuma-lan.tls=true
      - traefik.http.services.kuma-lan.loadbalancer.server.port=3001

  # ─────────────────────────────────────────
  #  PROMETHEUS – Collecte de métriques
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ${CONFIG}/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    networks:
      - proxy
    ports:
      - "9090:9090"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.prometheus-lan.rule=Host(`prometheus.lan`)
      - traefik.http.routers.prometheus-lan.entrypoints=websecure
      - traefik.http.routers.prometheus-lan.tls=true
      - traefik.http.services.prometheus-lan.loadbalancer.server.port=9090

  # ─────────────────────────────────────────
  #  NODE EXPORTER – Métriques système
  # ─────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - proxy
    ports:
      - "9100:9100"
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  CADVISOR – Métriques Docker
  # ─────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    networks:
      - proxy
    ports:
      - "8085:8080"
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  GRAFANA – Dashboard
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ${CONFIG}/grafana:/var/lib/grafana
    networks:
      - proxy
    ports:
      - "3004:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana-lan.rule=Host(`grafana.lan`)
      - traefik.http.routers.grafana-lan.entrypoints=websecure
      - traefik.http.routers.grafana-lan.tls=true
      - traefik.http.services.grafana-lan.loadbalancer.server.port=3000

volumes:
  prometheus-data:

networks:
  proxy:
    external: true
